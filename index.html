<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lyric Workspace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/winbox.bundle.min.js"></script>
</head>
<body>
    <!-- 🔴 เพิ่มเลเยอร์นี้สำหรับทำวอลเปเปอร์แบบภาพคมชัด -->
    <div id="desktop-wallpaper"></div>
    <div id="dynamic-bg"></div>

    <div id="loadingOverlay">
        <div>กำลังโหลดข้อมูลคลังเพลง...</div>
    </div>

   <!-- =========================================
         iPad OS Style Dock (แถบเมนูแอปด้านล่าง)
         ========================================= -->
    <div class="ipad-dock-container">
        <div class="ipad-dock">
            <!-- 1. คลังเพลง -->
            <button class="ipad-icon-btn" onclick="wm.openLibrary()" title="คลังเพลง">
                <div class="icon-box" style="background: linear-gradient(135deg, #007aff, #5ac8fa);">🏠</div>
                <span>คลังเพลง</span>
            </button>
            
            <!-- 2. ตั้งค่า -->
            <button class="ipad-icon-btn" onclick="wm.openSettings()" title="ตั้งค่า">
                <div class="icon-box" style="background: linear-gradient(135deg, #8e8e93, #c7c7cc);">⚙️</div>
                <span>ตั้งค่า</span>
            </button>
            
            <!-- 3. PiP -->
            <button class="ipad-icon-btn" onclick="togglePiPMode()" title="PiP (หน้าต่างลอย)">
                <div class="icon-box" style="background: linear-gradient(135deg, #34c759, #a4e3b7);">🪟</div>
                <span>PiP</span>
            </button>
            
            <!-- 4. Admin Sync (ซ่อนไว้ก่อน) -->
            <button id="btnDockAdminSync" class="ipad-icon-btn" style="display:none;" onclick="if(window.currentSongId) wm.openAdminSync(); else alert('กรุณากดเล่นเพลงที่ต้องการซิงค์ก่อนครับ');">
                <div class="icon-box" style="background: linear-gradient(135deg, #ff9500, #ffcc00);">⏱</div>
                <span>ซิงค์เนื้อ</span>
            </button>
            
            <!-- เส้นกั้น (Divider) -->
            <div class="dock-divider"></div>
            
            <!-- 5. Login / Logout -->
            <button id="btnHeaderLogin" class="ipad-icon-btn" onclick="loginWithGoogle()">
                <div class="icon-box" style="background: linear-gradient(135deg, #5856d6, #af52de);">👤</div>
                <span>เข้าสู่ระบบ</span>
            </button>
            <button id="btnHeaderLogout" class="ipad-icon-btn" style="display:none;" onclick="logout()">
                <div class="icon-box" style="background: linear-gradient(135deg, #ff3b30, #ff8d8a);">🚪</div>
                <span>ออกระบบ</span>
            </button>
        </div>
    </div>
    
    <!-- โกดังเก็บหน้าต่าง -->
    <div id="window-warehouse" style="display: none;">
        
        <!-- 1. คลังเพลง -->
        <div id="content-library" class="wb-content-padding">
            <div class="library-toolbar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 ค้นหาชื่อเพลง หรือ ศิลปิน..." oninput="filterSongs()">
                <button id="btnAddSong" class="btn-primary" onclick="openAddView()" style="display: none;">✨ เพิ่มเพลง</button>
            </div>
            <div id="artistChips" class="artist-chips"></div>
            <div id="songList" class="song-grid"></div>
        </div>

        <!-- 2. วิดีโอ -->
        <div id="content-player" style="width: 100%; height: 100%; background: #000;">
            <div id="youtubePlayer" style="width: 100%; height: 100%;"></div>
        </div>

        <!-- 3. เนื้อเพลง (ตอนนี้มีแค่กล่องเนื้อเพลงคลีนๆ) -->
        <div id="content-lyrics" class="wb-content-padding">
            <div id="lyricsContainer" class="lyrics-container"></div>
        </div>

        <!-- 🔴 4. หน้าต่าง Admin: เครื่องมือซิงค์ & แก้ไขเนื้อเพลง -->
        <div id="content-admin-sync" class="wb-content-padding">
            <div class="button-group" id="lyricControlBtnGroup" style="margin-bottom: 20px;">
                <button class="btn-secondary" onclick="prevLyric()">⏮ ย้อน (ลบเวลา)</button>
                <button class="btn-primary" onclick="nextLyric()" style="background: #ffcc00; color: #000;">⏭ ถัดไป (จับจังหวะ)</button>
            </div>
            <div id="timestampList" class="timestamp-list"></div>
            <button id="btnResetSync" class="btn-secondary" onclick="resetSync()" style="margin-top: 15px; width: 100%;">🔄 ล้างเวลาซิงค์เริ่มใหม่</button>
        </div>

        <!-- 5. ตั้งค่า -->
       <!-- 📦 4. เนื้อหา: ตั้งค่าแอป -->
        <div id="content-settings" class="wb-content-padding">
            
            <h3 style="margin-top:0;">🖼️ ภาพพื้นหลัง (Wallpaper)</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <button class="btn-secondary" style="flex: 1; font-size: 0.85em;" onclick="setWallpaper('default')">🌌 สีพื้นฐาน</button>
                <button class="btn-secondary" style="flex: 1; font-size: 0.85em;" onclick="setWallpaper('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?q=80&w=2000')">🌆 ไซเบอร์พังก์</button>
                <button class="btn-secondary" style="flex: 1; font-size: 0.85em;" onclick="setWallpaper('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2000')">⛰️ ภูเขาดวงดาว</button>
                <button class="btn-secondary" style="flex: 1; font-size: 0.85em;" onclick="setWallpaper('https://images.unsplash.com/photo-1506744626753-1fa28f673b0c?q=80&w=2000')">🏞️ ธรรมชาติ</button>
            </div>
            <input type="text" id="inputCustomWallpaper" placeholder="หรือวางลิงก์รูปภาพ (URL) ของคุณที่นี่..." onchange="setWallpaper(this.value)" style="margin-bottom: 25px;">
            
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">

            <!-- 🔴 ระบบใหม่: Accent Color -->
            <h3 style="margin-top:0;">🎨 สีสัน (Accent Color)</h3>
            <div style="display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap;">
                <button class="color-btn" style="background: #0a84ff;" onclick="setAccentColor('#0a84ff')" title="Apple Blue"></button>
                <button class="color-btn" style="background: #ff2a85;" onclick="setAccentColor('#ff2a85')" title="Neon Pink"></button>
                <button class="color-btn" style="background: #34c759;" onclick="setAccentColor('#34c759')" title="Hacker Green"></button>
                <button class="color-btn" style="background: #ffcc00;" onclick="setAccentColor('#ffcc00')" title="Cyber Yellow"></button>
                <button class="color-btn" style="background: #9b51e0;" onclick="setAccentColor('#9b51e0')" title="Deep Purple"></button>
            </div>

            <!-- 🔴 ระบบใหม่: Glassmorphism -->
            <h3 style="margin-top:0;">🪟 สไตล์กระจกหน้าต่าง (Glassmorphism)</h3>
            <label>ความทึบแสง (Opacity)</label>
            <input type="range" id="sliderOpacity" class="custom-slider" min="10" max="100" value="95" oninput="setWindowStyle()" style="margin-bottom: 15px;">
            
            <label>ความเบลอ (Blur)</label>
            <input type="range" id="sliderBlur" class="custom-slider" min="0" max="40" value="15" oninput="setWindowStyle()" style="margin-bottom: 25px;">

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">

            <!-- 🔴 ระบบใหม่: Reading -->
            <h3 style="margin-top:0;">📝 การอ่านเนื้อเพลง</h3>
            <label>ขนาดตัวอักษรเนื้อเพลงตอนร้อง (Font Size)</label>
            <input type="range" id="sliderFontSize" class="custom-slider" min="1" max="2.5" step="0.1" value="1.5" oninput="setLyricFontSize(this.value)" style="margin-bottom: 25px;">

            <h3 style="margin-top:0;">🈯️ แสดง/ซ่อนภาษา</h3>
            <div id="lyricLangToggles" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <label class="lang-toggle"><input type="checkbox" checked onchange="toggleLang(0)"> 🇯🇵 ญี่ปุ่น</label>
                <label class="lang-toggle"><input type="checkbox" checked onchange="toggleLang(1)"> 🔤 โรมาจิ</label>
                <label class="lang-toggle"><input type="checkbox" checked onchange="toggleLang(2)"> 🇹🇭 ไทย</label>
            </div>
        </div>

        <!-- 6. เพิ่ม/แก้ไขเพลง -->
        <div id="content-add" class="wb-content-padding">
            <label>ชื่อเพลง:</label>
            <input type="text" id="inputTitle" placeholder="เช่น ソワレ (Soirée)">
            <label>ชื่อศิลปิน:</label>
            <input type="text" id="inputArtist" placeholder="เช่น [Suisei] [Miko]">
            <label>ลิงก์ YouTube:</label>
            <input type="text" id="inputAudio" placeholder="วางลิงก์วิดีโอ YouTube ที่นี่">
            <label>เนื้อเพลง:</label>
            <textarea id="inputLyrics" placeholder="ท่อนที่ 1 ญี่ปุ่น&#10;ท่อนที่ 1 โรมาจิ&#10;ท่อนที่ 1 ไทย&#10;&#10;ท่อนที่ 2..."></textarea>
            <button id="btnSave" class="btn-primary" onclick="saveSong()" style="width: 100%; margin-top: 15px;">💾 บันทึกเพลง</button>
        </div>
        
    </div>

    <script type="module" src="app.js"></script>
    <!-- 🔴 ระบบ PiP  -->
    <script src="pip.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
