<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lyric Workspace</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/winbox@0.2.82/dist/winbox.bundle.min.js"></script>
</head>
<body>
    <!-- 🔴 เพิ่มเลเยอร์นี้สำหรับทำวอลเปเปอร์แบบ ภาพคมชัด -->
    <div id="desktop-wallpaper"></div>
    <div id="dynamic-bg"></div>

    <div id="loadingOverlay">
        <div>กำลังโหลดข้อมูลคลังเพลง...</div>
    </div>

   <!-- แถบ Dock (สไตล์ แคปซูลลอย + Live Activity) -->
    <nav class="floating-pill-dock" id="mainDock">
        
      <!-- 🔴 ส่วน Live Activity(จะโชว์ก็ต่อเมื่อมีเพลงเล่น) -->
        <div id="liveActivity" class="live-activity hidden" onclick="if(window.currentSongId) wm.openPlayer(document.getElementById('liveTitle').innerText)" title="เปิดหน้าต่างเครื่องเล่น">
            <div class="live-icon">🎵</div>
            <div class="live-info">
                <div id="liveTitle" class="live-title">-</div>
                <div id="liveArtist" class="live-artist">-</div>
            </div>
            
            <!-- 🔴 เพิ่มกลุ่มปุ่มควบคุมเพลงตรงนี้ -->
            <div class="live-controls" style="display: flex; gap: 5px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 15px; margin-left: 10px;">
                <button class="live-btn" onclick="event.stopPropagation(); prevLiveSong()" title="ก่อนหน้า">⏮</button>
                <button id="livePlayPauseBtn" class="live-btn" onclick="event.stopPropagation(); toggleLivePlay()" title="เล่น/พัก">⏸</button>
                <button class="live-btn" onclick="event.stopPropagation(); nextLiveSong()" title="ถัดไป">⏭</button>
            </div>
        </div>

        <!-- เส้นแบ่ง (จะโชว์เมื่อมี Live Activity) -->
        <div id="dockDivider" class="dock-divider hidden"></div>

        <!-- ส่วนเมนูหลัก (เปลี่ยนเป็นไอคอนล้วน) -->
        <div class="dock-buttons">
            <button class="pill-btn" onclick="wm.openLibrary()" title="คลังเพลง">🏠</button>
            <button class="pill-btn" onclick="wm.openSettings()" title="ตั้งค่า">⚙️</button>
            <button class="pill-btn" style="color: #00d2ff;" onclick="togglePiPMode()" title="PiP (หน้าต่างลอย)">🪟</button>
            
            <!-- ปุ่มแอดมิน -->
            <button id="btnDockAdminSync" class="pill-btn" style="display:none; color: #ffcc00;" onclick="if(window.currentSongId) wm.openAdminSync(); else alert('กรุณากดเล่นเพลงที่ต้องการซิงค์ก่อนครับ');" title="ซิงค์ & จัดการเนื้อ">⏱</button>
            
            <button id="btnHeaderLogin" class="pill-btn" style="color: #34c759;" onclick="loginWithGoogle()" title="เข้าสู่ระบบแอดมิน">👤</button>
            <button id="btnHeaderLogout" class="pill-btn" style="display:none; color: #ff3b30;" onclick="logout()" title="ออกจากระบบ">🚪</button>
        </div>
    </nav>

    <!-- โกดังเก็บหน้าต่าง -->
    <div id="window-warehouse" style="display: none;">
        
        <!-- 1. คลังเพลง -->
        <div id="content-library" class="wb-content-padding">
            <div class="library-toolbar">
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 ค้นหาชื่อเพลง หรือ ศิลปิน..." oninput="filterSongs()">
                <button id="btnAddSong" class="btn-primary" onclick="openAddView()" style="display: none;">✨ เพิ่มเพลง</button>
            </div>
            <div id="artistChips" class="artist-chips"></div>
            <div id="songList" class="song-grid"></div>
        </div>

        <!-- 2. วิดีโอ -->
        <div id="content-player" style="width: 100%; height: 100%; background: #000;">
            <div id="youtubePlayer" style="width: 100%; height: 100%;"></div>
        </div>

        <!-- 3. เนื้อเพลง (ตอนนี้มีแค่กล่องเนื้อเพลงคลีนๆ) -->
        <div id="content-lyrics" class="wb-content-padding">
            <div id="lyricsContainer" class="lyrics-container"></div>
        </div>

        <!-- 🔴 4. หน้าต่าง Admin: เครื่องมือซิงค์ & แก้ไขเนื้อเพลง -->
<div id="content-admin-sync" class="wb-content-padding">
    
    <!-- เปลี่ยนจาก button-group เป็น sticky-sync-bar ตรงนี้ครับ -->
    <div class="sticky-sync-bar" id="lyricControlBtnGroup">
        <button class="btn-secondary" onclick="prevLyric()">⏮ ย้อน (ลบเวลา)</button>
        <button class="btn-primary" onclick="nextLyric()" style="background: #ffcc00; color: #000;">⏭ ถัดไป (จับจังหวะ)</button>
    </div>

    <div id="timestampList" class="timestamp-list"></div>
    
    <button id="btnResetSync" class="btn-secondary" onclick="resetSync()" style="margin-top: 15px; width: 100%;">🔄 ล้างเวลาซิงค์เริ่มใหม่</button>
</div>

<!-- 5. ตั้งค่า -->
        <div id="content-settings" class="wb-content-padding">
            <h3 style="margin-top:0;">🖼️ ภาพพื้นหลัง (Wallpaper)</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <button class="btn-secondary" style="flex: 1; font-size: 0.85em;" onclick="setWallpaper('default')">🌌 สีพื้นฐาน</button>
                <button class="btn-secondary" style="flex: 1; font-size: 0.85em;" onclick="setWallpaper('https://images.unsplash.com/photo-1538370965046-79c0d6907d47?q=80&w=2000')">🌆 ไซเบอร์พังก์</button>
                <button class="btn-secondary" style="flex: 1; font-size: 0.85em;" onclick="setWallpaper('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2000')">⛰️ ภูเขาดวงดาว</button>
                <button class="btn-secondary" style="flex: 1; font-size: 0.85em;" onclick="setWallpaper('https://images.unsplash.com/photo-1506744626753-1fa28f673b0c?q=80&w=2000')">🏞️ ธรรมชาติ</button>
            </div>
           <input type="text" id="inputCustomWallpaper" placeholder="หรือวางลิงก์รูปภาพ (URL) ของคุณที่นี่..." onchange="setWallpaper(this.value)" style="margin-bottom: 15px;">
            
            <!-- 🔴 เพิ่มเมนูให้ผู้ใช้เลือกขนาดภาพพื้นหลัง -->
            <label>รูปแบบภาพพื้นหลัง:</label>
            <select id="bgSizeSelect" onchange="setBgSize(this.value)" style="width:100%; padding:10px; margin-bottom:30px; background:#2c2c2e; color:white; border-radius:10px; border:none; outline:none;">
                <option value="cover">เต็มจอ (ภาพอาจถูกตัดขอบ)</option>
                <option value="contain">พอดีจอ (เห็นภาพครบ แต่อาจมีขอบดำ)</option>
            </select>
            
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px;">

            <!-- 🔴 เพิ่มสวิตช์เปิด-ปิด โหมดสุ่มเพลง -->
            <h3 style="margin-top: 0;">🔀 โหมดเล่นเพลง</h3>
            <div style="margin-bottom: 25px;">
                <label class="lang-toggle" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="toggleShuffleBtn" onchange="toggleShuffle(this.checked)"> สุ่มเพลงอัตโนมัติเมื่อเล่นจบ
                </label>
            </div>
            
            <!-- 🔴 ระบบปรับแต่งที่เพิ่มกลับเข้ามา -->
            <h3 style="margin-top:0;">🪟 ปรับแต่งหน้าต่าง WinBox</h3>
            <label>ความโปร่งใส (Opacity):</label>
            <input type="range" id="sliderOpacity" min="10" max="100" value="95" oninput="setWindowStyle()" style="width:100%; margin-bottom:10px;">
            <label>ความเบลอ (Blur):</label>
            <input type="range" id="sliderBlur" min="0" max="50" value="20" oninput="setWindowStyle()" style="width:100%; margin-bottom:25px;">
            
            <h3 style="margin-top:0;">📝 ขนาดตัวอักษรเนื้อเพลง</h3>
            <input type="range" id="sliderFontSize" min="0.8" max="2.5" step="0.1" value="1.15" oninput="setLyricFontSize(this.value)" style="width:100%; margin-bottom:30px;">
            
            <h3 style="margin-top: 0;">🈯️ แสดง/ซ่อนภาษา</h3>
            <div id="lyricLangToggles" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <label class="lang-toggle"><input type="checkbox" checked onchange="toggleLang(0)"> 🇯🇵 ญี่ปุ่น</label>
                <label class="lang-toggle"><input type="checkbox" checked onchange="toggleLang(1)"> 🔤 โรมาจิ</label>
                <label class="lang-toggle"><input type="checkbox" checked onchange="toggleLang(2)"> 🇹🇭 ไทย</label>
            </div>
        </div>

        <!-- 6. เพิ่ม/แก้ไขเพลง -->
        <div id="content-add" class="wb-content-padding">
            <label>ชื่อเพลง:</label>
            <input type="text" id="inputTitle" placeholder="เช่น ソワレ (Soirée)">
            <label>ชื่อศิลปิน:</label>
            <input type="text" id="songArtist" placeholder="เช่น [Suisei] [Miko]" list="artistList"> <datalist id="artistList"></datalist>
            <label>ลิงก์ YouTube:</label>
            <input type="text" id="inputAudio" placeholder="วางลิงก์วิดีโอ YouTube ที่นี่">
            <label>เนื้อเพลง:</label>
            <textarea id="inputLyrics" placeholder="ท่อนที่ 1 ญี่ปุ่น&#10;ท่อนที่ 1 โรมาจิ&#10;ท่อนที่ 1 ไทย&#10;&#10;ท่อนที่ 2..."></textarea>
            <button id="btnSave" class="btn-primary" onclick="saveSong()" style="width: 100%; margin-top: 15px;">💾 บันทึกเพลง</button>
        </div>
        
    </div>
    
    <!-- 🔴 ระบบ เชื่อมไฟล์  -->
    <script src="pip.js"></script>
    <script src="notify.js"></script> <script type="module" src="app.js"></script>
    <script type="module" src="app.js"></script>

    <!-- 🔴 แถบสุ่มเพลงด้านขวา (Random Playlist Widget) -->
    <div id="randomPlaylistPanel" class="right-panel open">
        <!-- ปุ่มกดพับเก็บ / กางออก -->
        <button class="panel-toggle-btn" onclick="toggleRandomPanel()">
            <span id="panelToggleIcon">▶</span>
        </button>
        
        <!-- เนื้อหาด้านใน -->
        <div class="panel-content">
            <h3 style="margin-top: 0; font-size: 1.1em; text-align: center; color: #00d2ff; margin-bottom: 15px;">
                🎲 5 เพลงสุ่มน่าฟัง
            </h3>
            <div id="randomSongList" class="random-song-list">
                <!-- รายชื่อเพลงจะถูกเติมด้วย JavaScript -->
            </div>
            <button class="btn-primary" style="width: 100%; margin-top: 15px; font-size: 0.9em;" onclick="renderRandomPlaylist()">
                🔄 สุ่มเพลงใหม่
            </button>
         </div>
    </div> <button id="btnDockNotify" class="floating-notify-btn" onclick="window.openNotifyWindow()" title="เพลงใหม่ล่าสุด">
        🔔<span id="notifyBadge" class="notify-badge" style="display: none;"></span>
    </button>

</body>
</html>
