<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lyric Player</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(255, 255, 255, 0.1); letter-spacing: 1px; }
        
        .header-title { font-size: 1.3em; font-weight: bold; flex-grow: 1; text-align: center; }
        .header-btn-group { width: 100px; display: flex; justify-content: flex-end; }
        .header-spacer { width: 100px; } 

        .btn-auth { background: transparent; border: 1px solid; padding: 6px 14px; font-size: 0.85em; border-radius: 20px; cursor: pointer; transition: all 0.3s ease; font-weight: bold; }
        .btn-login { color: #00b4db; border-color: #00b4db; }
        .btn-login:hover { background: rgba(0, 180, 219, 0.1); }
        .btn-logout { color: #ff5252; border-color: rgba(255, 82, 82, 0.5); }
        .btn-logout:hover { background: rgba(255, 82, 82, 0.1); }
        
        .container { padding: 20px; max-width: 600px; margin: auto; flex-grow: 1; width: 100%; box-sizing: border-box; }
        
        button { background: linear-gradient(45deg, #00b4db, #0083b0); color: white; border: none; padding: 14px 20px; font-size: 1.1em; font-weight: bold; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 15px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 180, 219, 0.3); }
        button:hover { box-shadow: 0 6px 20px rgba(0, 180, 219, 0.5); transform: translateY(-2px); }
        button:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(0, 180, 219, 0.2); }
        button:disabled { background: #546e7a; cursor: not-allowed; box-shadow: none; transform: none; }
        
        .btn-secondary { background: rgba(255, 255, 255, 0.1); box-shadow: none; border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.2); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); }

        label { font-size: 0.9em; color: #b0bec5; margin-top: 10px; display: block; }
        input, textarea { width: 100%; padding: 12px 15px; margin-top: 8px; margin-bottom: 20px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; color: #ffffff; font-size: 1em; box-sizing: border-box; transition: border-color 0.3s ease; }
        input:focus, textarea:focus { outline: none; border-color: #00b4db; background: rgba(0, 0, 0, 0.4); }
        textarea { height: 180px; resize: vertical; line-height: 1.5; }
        
        .song-item { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(5px); padding: 12px 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center; transition: transform 0.2s ease, background 0.2s ease; gap: 10px; }
        .song-item:hover { transform: translateX(5px); background: rgba(255, 255, 255, 0.08); }
        
        /* สไตล์สำหรับรูปภาพหน้าปกและชื่อเพลง */
        .song-info-wrapper { display: flex; align-items: center; flex-grow: 1; min-width: 0; }
        .song-thumbnail { width: 85px; height: 48px; border-radius: 6px; object-fit: cover; margin-right: 12px; flex-shrink: 0; background: #000; box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
        .song-item-title { font-size: 1.05em; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .song-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-action { margin: 0; padding: 8px 12px; border-radius: 30px; font-size: 0.85em; width: auto; }
        
        @keyframes slideUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .slide-up-anim { animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        .lyric-box { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.15); padding: 30px 20px; border-radius: 16px; box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6); min-height: 150px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 1.4em; font-weight: bold; line-height: 1.6; margin: 15px 0; white-space: pre-wrap; text-shadow: 0 2px 4px rgba(0,0,0,0.5); opacity: 0; }
        .lyric-sub { text-align: center; font-size: 1em; color: rgba(255, 255, 255, 0.4); white-space: pre-wrap; min-height: 3em; display: flex; align-items: center; justify-content: center; padding: 0 20px; opacity: 0; }
        .youtube-container { position: relative; width: 100%; padding-bottom: 56.25%; margin-bottom: 15px; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .youtube-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .timestamp-editor-container { margin-top: 25px; background: rgba(0, 0, 0, 0.25); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 15px; }
        .timestamp-list { max-height: 180px; overflow-y: auto; padding-right: 5px; }
        .timestamp-list::-webkit-scrollbar { width: 6px; }
        .timestamp-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        
        .view { display: none; animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .button-group { display: flex; gap: 10px; margin-top: 10px; }
        #loadingOverlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; justify-content: center; align-items: center; font-size: 1.2em; font-weight: bold; flex-direction: column; gap: 15px; transition: opacity 0.3s; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div>กำลังโหลดข้อมูลคลังเพลง...</div>
    </div>

    <header>
        <div class="header-spacer"></div>
        <div id="headerTitle" class="header-title">คลังเพลงของฉัน</div>
        <div class="header-btn-group">
            <button id="btnHeaderLogin" class="btn-auth btn-login" onclick="loginWithGoogle()">เข้าสู่ระบบ</button>
            <button id="btnHeaderLogout" class="btn-auth btn-logout" style="display:none;" onclick="logout()">ออกจากระบบ</button>
        </div>
    </header>

    <div class="container">
        <div id="view-list" class="view">
            <button id="btnAddSong" onclick="openAddView()" style="display: none;">✨ เพิ่มเพลงใหม่</button>
            <h3 style="margin-top:30px; font-weight: normal; color: #b0bec5; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">เลือกเพลงที่ต้องการฟัง</h3>
            <div id="songList"></div>
        </div>

        <div id="view-add" class="view">
            <label>ชื่อเพลง:</label>
            <input type="text" id="inputTitle" placeholder="เช่น ソワレ (Soirée)">
            <label>ชื่อศิลปิน:</label>
            <input type="text" id="inputArtist" placeholder="เช่น 星街すいせい (Hoshimachi Suisei)">
            <label>ลิงก์ YouTube:</label>
            <input type="text" id="inputAudio" placeholder="วางลิงก์วิดีโอ YouTube ที่นี่">
            <label>เนื้อเพลง (เว้นบรรทัด 1 บรรทัดเปล่า เพื่อแบ่งท่อนถัดไป):</label>
            <textarea id="inputLyrics" placeholder="ท่อนที่ 1 ญี่ปุ่น&#10;ท่อนที่ 1 โรมาจิ&#10;ท่อนที่ 1 ไทย&#10;&#10;ท่อนที่ 2 ญี่ปุ่น..."></textarea>
            
            <button id="btnSave" onclick="saveSong()">💾 บันทึกเพลง</button>
            <button class="btn-secondary" onclick="showView('view-list')">❌ ยกเลิก</button>
        </div>

        <div id="view-player" class="view">
            <div id="playerSongInfo" style="text-align: center; margin-bottom: 15px; line-height: 1.4;">
                <div id="playerTitle" style="font-size: 1.3em; font-weight: bold; color: #00b4db;">ชื่อเพลง</div>
                <div id="playerArtist" style="font-size: 0.95em; color: #b0bec5; margin-top: 2px;">ศิลปิน</div>
            </div>

            <div class="youtube-container">
                <div id="youtubePlayer"></div>
            </div>
            
            <div class="lyric-sub" id="lyricPrev"></div>
            <div class="lyric-box" id="lyricDisplay"></div>
            <div class="lyric-sub" id="lyricNext"></div>
            
            <div class="button-group">
                <button class="btn-secondary" onclick="prevLyric()" style="flex: 1;">⏮ ย้อนกลับ</button>
                <button onclick="nextLyric()" style="flex: 2; font-size: 1.2em;">⏭ ถัดไป</button>
            </div>

            <div class="timestamp-editor-container">
                <h4 style="margin: 0 0 10px 0; font-weight: normal; color: #b0bec5; font-size: 0.95em; display: flex; justify-content: space-between;">
                    <span id="tsEditorTitle">⏱ Timestamp (วินาที)</span>
                    <span id="tsEditorSub" style="font-size: 0.85em; color: #00b4db;"></span>
                </h4>
                <div id="timestampList" class="timestamp-list"></div>
            </div>
            
            <button id="btnResetSync" class="btn-secondary" onclick="resetSync()" style="margin-top: 15px; font-size: 0.9em; background: rgba(255, 152, 0, 0.1); border-color: rgba(255, 152, 0, 0.3); color: #ff9800; display: none;">🔄 ล้างเวลาซิงค์ทั้งหมด (เริ่มจับจังหวะใหม่)</button>
            <button class="btn-secondary" onclick="showView('view-list')" style="margin-top: 15px;">🏠 กลับคลังเพลง</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // ----------------------------------------------------
        // ตั้งค่าอีเมลที่มีสิทธิ์เป็น Admin (แก้ไข เพิ่ม ลบ เพลงได้)
        // ใส่ Email ของคุณที่นี่ (สามารถเพิ่มหลายอันได้โดยคั่นด้วยลูกน้ำ)
        // ----------------------------------------------------
        const ALLOWED_EMAILS = ["sashikiwa@gmail.com", "panupong.bb27115@gmail.com"]; 
        // ----------------------------------------------------

        const firebaseConfig = {
            apiKey: "AIzaSyDV-gefPFqCmAvYmrSXeb5W1JUKf4Ev50Q",
            authDomain: "musix-syn.firebaseapp.com",
            projectId: "musix-syn",
            storageBucket: "musix-syn.firebasestorage.app",
            messagingSenderId: "154980084057",
            appId: "1:154980084057:web:e0af2ed833cb127f3b8448",
            measurementId: "G-2NCK3PQEFV"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const songsCollection = collection(db, 'songs');

        window.songs = [];
        window.currentLyricsArray = [];
        window.currentLyricIndex = -1;
        window.editingSongId = null;
        window.currentSongId = null;
        window.ytPlayer = null;
        window.syncInterval = null;
        window.isLoggedIn = false; 
        window.isAdmin = false; // ตัวแปรใหม่สำหรับเช็คสิทธิ์ Admin
        window.isYTApiReady = false;

        window.onYouTubeIframeAPIReady = function() {
            window.isYTApiReady = true; 
        };

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        if (firstScriptTag) {
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        } else {
            document.head.appendChild(tag);
        }

        onAuthStateChanged(auth, (user) => {
            window.isLoggedIn = !!user;
            window.isAdmin = user && ALLOWED_EMAILS.includes(user.email); // ตรวจสอบว่าเป็น Admin หรือไม่
            
            if (window.isLoggedIn) {
                document.getElementById('btnHeaderLogout').style.display = 'block';
                document.getElementById('btnHeaderLogin').style.display = 'none';
            } else {
                document.getElementById('btnHeaderLogout').style.display = 'none';
                document.getElementById('btnHeaderLogin').style.display = 'block';
            }

            // แสดงปุ่มเพิ่มเพลงเฉพาะ Admin
            if (window.isAdmin && document.getElementById('view-list').classList.contains('active')) {
                document.getElementById('btnAddSong').style.display = 'block';
            } else {
                document.getElementById('btnAddSong').style.display = 'none';
            }
            
            fetchSongs(); 
        });

        window.loginWithGoogle = async function() {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login Error:", error);
                alert("เข้าสู่ระบบไม่สำเร็จ: " + error.message);
            }
        }

        window.logout = async function() {
            if(confirm('ต้องการออกจากระบบใช่หรือไม่?')) {
                try {
                    await signOut(auth);
                    if (window.ytPlayer && typeof window.ytPlayer.stopVideo === 'function') {
                        window.ytPlayer.stopVideo();
                    }
                } catch (error) {
                    console.error("Logout Error:", error);
                }
            }
        }

        async function fetchSongs() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            try {
                const querySnapshot = await getDocs(songsCollection);
                window.songs = [];
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    window.songs.push({
                        id: doc.id,
                        title: data.title,
                        artist: data.artist,
                        audioPath: data.audioPath,
                        lyrics: data.lyrics,
                        timestamps: data.timestamps || []
                    });
                });
                document.getElementById('loadingOverlay').style.display = 'none';
                
                if (!document.getElementById('view-player').classList.contains('active') && 
                    !document.getElementById('view-add').classList.contains('active')) {
                    window.showView('view-list');
                } else {
                    window.renderSongList();
                }
            } catch (error) {
                console.error("Error fetching songs:", error);
                alert("เชื่อมต่อฐานข้อมูลไม่สำเร็จ กรุณาตรวจสอบสิทธิ์ Rules ว่าอนุญาตให้อ่านข้อมูลได้หรือไม่");
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        window.extractYouTubeID = function(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        window.showView = function(viewId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            const headerTitle = document.getElementById('headerTitle');
            if (viewId === 'view-list') {
                headerTitle.innerText = 'คลังเพลงของฉัน';
                
                document.getElementById('btnAddSong').style.display = window.isAdmin ? 'block' : 'none';
                
                window.renderSongList();
                clearInterval(window.syncInterval);
                window.currentSongId = null;
                if (window.ytPlayer && typeof window.ytPlayer.stopVideo === 'function') {
                    window.ytPlayer.stopVideo();
                }
            } else if (viewId === 'view-player') {
                headerTitle.innerText = 'กำลังเล่นเพลง';
                
                if (window.isAdmin) {
                    document.getElementById('tsEditorTitle').innerText = "⏱ แก้ไข Timestamp (วินาที)";
                    document.getElementById('tsEditorSub').innerText = "พิมพ์แก้ไขตัวเลขได้ทันที (Admin)";
                    document.getElementById('tsEditorSub').style.color = "#00b4db";
                    document.getElementById('btnResetSync').style.display = 'block';
                } else {
                    document.getElementById('tsEditorTitle').innerText = "⏱ Timestamp (วินาที)";
                    document.getElementById('tsEditorSub').innerText = "โหมดดูอย่างเดียว";
                    document.getElementById('tsEditorSub').style.color = "#b0bec5";
                    document.getElementById('btnResetSync').style.display = 'none';
                }
            }
        }

        window.openAddView = function() {
            if (!window.isAdmin) return;
            window.editingSongId = null;
            document.getElementById('headerTitle').innerText = 'เพิ่มเพลงใหม่';
            document.getElementById('inputTitle').value = '';
            document.getElementById('inputArtist').value = '';
            document.getElementById('inputAudio').value = '';
            document.getElementById('inputLyrics').value = '';
            window.showView('view-add');
        }

        window.editSong = function(id) {
            if (!window.isAdmin) return;
            const song = window.songs.find(s => s.id === id);
            if (!song) return;

            window.editingSongId = id;
            document.getElementById('headerTitle').innerText = 'แก้ไขเพลง';
            document.getElementById('inputTitle').value = song.title;
            document.getElementById('inputArtist').value = song.artist || '';
            document.getElementById('inputAudio').value = song.audioPath;
            document.getElementById('inputLyrics').value = song.lyrics;
            window.showView('view-add');
        }

        window.saveSong = async function() {
            if (!window.isAdmin) {
                alert("ต้องเข้าสู่ระบบด้วยอีเมล Admin ก่อนจึงจะบันทึกได้ครับ");
                return;
            }
            
            const title = document.getElementById('inputTitle').value.trim();
            const artist = document.getElementById('inputArtist').value.trim();
            const audioPath = document.getElementById('inputAudio').value.trim();
            const lyrics = document.getElementById('inputLyrics').value.trim();
            const btnSave = document.getElementById('btnSave');

            if (!title || !lyrics) {
                alert("กรุณากรอกชื่อเพลงและเนื้อเพลงครับ");
                return;
            }

            if (!window.extractYouTubeID(audioPath)) {
                alert("ลิงก์ YouTube ไม่ถูกต้อง");
                return;
            }

            btnSave.disabled = true;
            btnSave.innerText = "กำลังบันทึก...";

            try {
                if (window.editingSongId) {
                    const songRef = doc(db, "songs", window.editingSongId);
                    await updateDoc(songRef, { title, artist, audioPath, lyrics });
                } else {
                    await addDoc(songsCollection, { title, artist, audioPath, lyrics, timestamps: [] });
                }
                
                await fetchSongs();
                window.showView('view-list'); 

            } catch (e) {
                console.error(e);
                alert("บันทึกไม่สำเร็จ");
            } finally {
                btnSave.disabled = false;
                btnSave.innerText = "💾 บันทึกเพลง";
                window.editingSongId = null;
            }
        }

        window.renderSongList = function() {
            const listContainer = document.getElementById('songList');
            listContainer.innerHTML = '';

            if (window.songs.length === 0) {
                listContainer.innerHTML = '<p style="color:rgba(255,255,255,0.5); text-align:center; margin-top:40px;">ยังไม่มีเพลงในคลัง</p>';
                return;
            }

            window.songs.forEach(song => {
                const item = document.createElement('div');
                item.className = 'song-item';
                
                // สกัดรหัสวิดีโอเพื่อดึงรูปภาพหน้าปก
                const videoId = window.extractYouTubeID(song.audioPath);
                const thumbUrl = videoId ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg` : '';
                
                let actionsHtml = '';
                if (window.isAdmin) {
                    actionsHtml = `
                        <button class="btn-action btn-secondary" onclick="editSong('${song.id}')">✏️</button>
                        <button class="btn-action btn-secondary" style="background:rgba(229, 57, 53, 0.2); border-color:rgba(229, 57, 53, 0.4); color:#ef5350;" onclick="deleteSong('${song.id}')">ลบ</button>
                    `;
                }
                
                item.innerHTML = `
                    <div class="song-info-wrapper">
                        <img src="${thumbUrl}" class="song-thumbnail" onerror="this.style.display='none'" alt="Cover">
                        <div class="song-item-title">
                            ${song.title}
                            <span style="font-size: 0.85em; color: #b0bec5; display: block; margin-top: 2px;">🎤 ${song.artist || 'ไม่ระบุศิลปิน'}</span>
                        </div>
                    </div>
                    <div class="song-item-actions">
                        <button class="btn-action" style="background: linear-gradient(45deg, #11998e, #38ef7d);" onclick="playSong('${song.id}')">▶</button>
                        ${actionsHtml}
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        window.deleteSong = async function(id) {
            if (!window.isAdmin) return;
            if(confirm('ต้องการลบเพลงนี้ใช่หรือไม่?')) {
                try {
                    await deleteDoc(doc(db, "songs", id));
                    await fetchSongs();
                } catch(e) {
                    console.error(e);
                    alert("ลบไม่สำเร็จ");
                }
            }
        }

        window.playSong = function(id) {
            window.currentSongId = id;
            const song = window.songs.find(s => s.id === id);
            if (!song) return;

            document.getElementById('playerTitle').innerText = song.title;
            document.getElementById('playerArtist').innerText = `ศิลปิน: ${song.artist || 'ไม่ระบุศิลปิน'}`;

            window.currentLyricsArray = song.lyrics.split(/\n\s*\n/);
            window.currentLyricIndex = -1;
            window.renderTimestampEditor();
            window.updateLyricDisplay();
            window.showView('view-player');

            const videoId = window.extractYouTubeID(song.audioPath);
            
            if (window.ytPlayer) {
                if (typeof window.ytPlayer.loadVideoById === 'function') {
                    window.ytPlayer.loadVideoById(videoId);
                }
            } else {
                if (window.isYTApiReady || (window.YT && window.YT.Player)) {
                    window.ytPlayer = new YT.Player('youtubePlayer', {
                        height: '100%',
                        width: '100%',
                        videoId: videoId,
                        playerVars: { 'playsinline': 1, 'controls': 1 }
                    });
                } else {
                    alert("สคริปต์ YouTube ยังโหลดไม่เสร็จ กรุณารอสักครู่แล้วลองกดเล่นอีกครั้งครับ");
                    window.showView('view-list');
                    return;
                }
            }

            clearInterval(window.syncInterval);
            window.syncInterval = setInterval(() => {
                if (!window.ytPlayer || typeof window.ytPlayer.getCurrentTime !== 'function') return;
                
                const currentSong = window.songs.find(s => s.id === window.currentSongId);
                if (!currentSong || !currentSong.timestamps) return;

                const currentTime = window.ytPlayer.getCurrentTime();
                if (currentTime === undefined || currentTime === 0) return;

                const nextIndex = window.currentLyricIndex + 1;
                if (nextIndex <= window.currentLyricsArray.length) {
                    const targetTime = currentSong.timestamps[nextIndex];
                    if (targetTime !== undefined && targetTime !== null && currentTime >= targetTime) {
                        window.nextLyric(true); 
                    }
                }

                if (window.currentLyricIndex > -1) {
                    const currentLyricTime = currentSong.timestamps[window.currentLyricIndex];
                    if (currentLyricTime !== undefined && currentLyricTime !== null && currentTime < currentLyricTime) {
                        let expectedIndex = -1;
                        for (let i = 0; i < currentSong.timestamps.length; i++) {
                            if (currentSong.timestamps[i] !== null && currentTime >= currentSong.timestamps[i]) {
                                expectedIndex = i;
                            }
                        }
                        if (window.currentLyricIndex !== expectedIndex) {
                            window.currentLyricIndex = expectedIndex;
                            window.updateLyricDisplay();
                        }
                    }
                }
            }, 100); 
        }

        window.saveTimestampsToFirebase = async function() {
            if (!window.isAdmin) return;
            const song = window.songs.find(s => s.id === window.currentSongId);
            if (song) {
                try {
                    await updateDoc(doc(db, "songs", window.currentSongId), { timestamps: song.timestamps });
                } catch(e) {
                    console.error("Failed to save timestamp to Firebase", e);
                }
            }
        }

        window.renderTimestampEditor = function() {
            const container = document.getElementById('timestampList');
            container.innerHTML = '';
            const song = window.songs.find(s => s.id === window.currentSongId);
            if (!song) return;

            window.currentLyricsArray.forEach((lyric, index) => {
                const row = document.createElement('div');
                row.className = 'ts-row';
                row.id = `ts-row-${index}`;
                row.style.display = 'flex';
                row.style.justifyContent = 'space-between';
                row.style.alignItems = 'center';
                row.style.padding = '5px 8px';
                row.style.borderRadius = '6px';
                row.style.marginBottom = '4px';
                row.style.transition = 'background 0.2s ease';

                const textSnippet = lyric.split('\n')[0] || `ท่อนที่ ${index + 1}`;
                const label = document.createElement('span');
                label.className = 'ts-label';
                label.style.fontSize = '0.85em';
                label.style.whiteSpace = 'nowrap';
                label.style.overflow = 'hidden';
                label.style.textOverflow = 'ellipsis';
                label.style.paddingRight = '10px';
                label.innerText = `${index + 1}. ${textSnippet.substring(0, 22)}${textSnippet.length > 22 ? '...' : ''}`;

                const input = document.createElement('input');
                input.type = 'number';
                input.step = '0.1';
                input.min = '0';
                input.className = 'ts-input';
                input.id = `ts-input-${index}`;
                input.style.width = '85px';
                input.style.margin = '0';
                input.style.padding = '4px 6px';
                input.style.fontSize = '0.85em';
                input.style.background = 'rgba(0, 0, 0, 0.4)';
                input.style.border = '1px solid rgba(255, 255, 255, 0.2)';
                input.style.borderRadius = '5px';
                input.style.color = '#fff';
                input.style.textAlign = 'center';
                
                input.value = (song.timestamps && song.timestamps[index] != null) ? song.timestamps[index].toFixed(1) : '';
                
                if (!window.isAdmin) {
                    input.readOnly = true;
                    input.style.border = 'none';
                    input.style.background = 'transparent';
                } else {
                    input.onchange = (e) => {
                        const val = parseFloat(e.target.value);
                        const songIdx = window.songs.findIndex(s => s.id === window.currentSongId);
                        if (songIdx !== -1) {
                            if (!window.songs[songIdx].timestamps) window.songs[songIdx].timestamps = [];
                            window.songs[songIdx].timestamps[index] = isNaN(val) ? null : val;
                            window.saveTimestampsToFirebase();
                        }
                    };
                }

                row.appendChild(label);
                row.appendChild(input);
                container.appendChild(row);
            });
        }

        window.syncTimestampEditorUI = function() {
            const song = window.songs.find(s => s.id === window.currentSongId);
            if (!song) return;

            window.currentLyricsArray.forEach((_, index) => {
                const row = document.getElementById(`ts-row-${index}`);
                const label = row ? row.querySelector('.ts-label') : null;
                const input = document.getElementById(`ts-input-${index}`);

                if (row && label && input) {
                    if (index === window.currentLyricIndex) {
                        row.style.background = 'rgba(0, 180, 219, 0.25)';
                        label.style.color = '#00b4db';
                        label.style.fontWeight = 'bold';
                    } else {
                        row.style.background = 'transparent';
                        label.style.color = '#ffffff';
                        label.style.fontWeight = 'normal';
                    }

                    if (document.activeElement !== input) {
                        input.value = (song.timestamps && song.timestamps[index] != null) ? song.timestamps[index].toFixed(1) : '';
                    }
                }
            });
        }

        window.updateLyricDisplay = function() {
            const displayPrev = document.getElementById('lyricPrev');
            const displayMain = document.getElementById('lyricDisplay');
            const displayNext = document.getElementById('lyricNext');

            displayPrev.classList.remove('slide-up-anim');
            displayMain.classList.remove('slide-up-anim');
            displayNext.classList.remove('slide-up-anim');

            void displayMain.offsetWidth;

            if (window.currentLyricIndex === -1) {
                displayMain.innerText = "กดปุ่ม 'ถัดไป' เพื่อเริ่มแสดงเนื้อเพลง\n🎵 [ เริ่มเพลง ]";
            } else if (window.currentLyricIndex >= window.currentLyricsArray.length) {
                displayMain.innerText = "✨ [ จบเพลง ] ✨";
            } else {
                displayMain.innerText = window.currentLyricsArray[window.currentLyricIndex];
            }

            if (window.currentLyricIndex > 0 && window.currentLyricIndex < window.currentLyricsArray.length + 1) {
                displayPrev.innerText = window.currentLyricsArray[window.currentLyricIndex - 1].split('\n')[0] + "...";
            } else {
                displayPrev.innerText = "";
            }

            if (window.currentLyricIndex >= -1 && window.currentLyricIndex < window.currentLyricsArray.length - 1) {
                displayNext.innerText = window.currentLyricsArray[window.currentLyricIndex + 1].split('\n')[0] + "...";
            } else {
                displayNext.innerText = "";
            }

            displayPrev.classList.add('slide-up-anim');
            displayMain.classList.add('slide-up-anim');
            displayNext.classList.add('slide-up-anim');

            window.syncTimestampEditorUI();
        }

        window.nextLyric = function(isAuto = false) {
            if (window.currentLyricsArray.length === 0) return;
            if (window.currentLyricIndex < window.currentLyricsArray.length) {
                window.currentLyricIndex++;
                window.updateLyricDisplay();

                // บันทึกจังหวะอัตโนมัติเฉพาะเมื่อเป็น Admin และกดเอง (ไม่ใช่ Auto จากระบบซิงค์)
                if (!isAuto && window.isAdmin && window.currentSongId && window.ytPlayer && typeof window.ytPlayer.getCurrentTime === 'function') {
                    const songIndex = window.songs.findIndex(s => s.id === window.currentSongId);
                    if (songIndex !== -1) {
                        if (!window.songs[songIndex].timestamps) window.songs[songIndex].timestamps = [];
                        window.songs[songIndex].timestamps[window.currentLyricIndex] = window.ytPlayer.getCurrentTime();
                        window.saveTimestampsToFirebase();
                    }
                }
            }
        }

        window.prevLyric = function() {
            if (window.currentLyricIndex > -1) {
                if (window.isAdmin && window.currentSongId) {
                    const songIndex = window.songs.findIndex(s => s.id === window.currentSongId);
                    if (songIndex !== -1 && window.songs[songIndex].timestamps) {
                        window.songs[songIndex].timestamps[window.currentLyricIndex] = null;
                        window.saveTimestampsToFirebase();
                    }
                }
                
                window.currentLyricIndex--;
                window.updateLyricDisplay();
            }
        }

        window.resetSync = function() {
            if (!window.isAdmin) return;
            if(confirm('ต้องการล้างเวลาที่ซิงค์ไว้ของเพลงนี้ทั้งหมดเพื่อเริ่มจับจังหวะใหม่ใช่หรือไม่?')) {
                const songIndex = window.songs.findIndex(s => s.id === window.currentSongId);
                if (songIndex !== -1) {
                    window.songs[songIndex].timestamps = [];
                    window.saveTimestampsToFirebase();
                    window.currentLyricIndex = -1;
                    window.renderTimestampEditor();
                    window.updateLyricDisplay();
                    if (window.ytPlayer && typeof window.ytPlayer.seekTo === 'function') window.ytPlayer.seekTo(0);
                    alert('ล้างเวลาซิงค์เรียบร้อยครับ กด Next เพื่อเริ่มจับจังหวะใหม่ได้เลย');
                }
            }
        }
    </script>
</body>
</html>
