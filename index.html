<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lyric Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loadingOverlay">
        <div>กำลังโหลดข้อมูลคลังเพลง...</div>
    </div>

    <header>
        <div class="header-spacer" style="width: 110px;"></div>
        <div id="headerTitle" class="header-title">คลังเพลงของฉัน</div>
        <div class="header-btn-group" style="width: 110px;">
            <button class="btn-auth" onclick="showView('view-settings')" style="font-size: 1.1em; padding: 0 8px;">⚙️</button>
            <button id="btnHeaderLogin" class="btn-auth btn-login" onclick="loginWithGoogle()">เข้าสู่ระบบ</button>
            <button id="btnHeaderLogout" class="btn-auth btn-logout" style="display:none;" onclick="logout()">ออกจากระบบ</button>
        </div>
    </header>

    <div class="container">
        <div id="view-list" class="view active">
            <button id="btnAddSong" onclick="openAddView()" style="display: none;">✨ เพิ่มเพลงใหม่</button>
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 ค้นหาชื่อเพลง หรือ ศิลปิน..." oninput="filterSongs()">
            <div id="artistChips" class="artist-chips">
                <button class="chip active" onclick="filterByArtist('All')">ทั้งหมด</button>
            </div>
            <h3 style="margin-top:15px; font-weight: normal; color: #b0bec5; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">เลือกเพลงที่ต้องการฟัง</h3>
            <div id="songList"></div>
        </div>

        <div id="view-settings" class="view">
            <h3 style="font-weight: normal; color: #b0bec5; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-top: 0;">✨ เลือกสีออร่าการ์ดเพลง</h3>
            <div class="theme-list">
                <button onclick="setTheme('default')" class="theme-btn" style="background: linear-gradient(120deg, #00d2ff, #9b51e0, #ff2a85, #ff8c00, #00d2ff);">🌈 Apple Glow (ค่าเริ่มต้น)</button>
                <button onclick="setTheme('ocean')" class="theme-btn" style="background: linear-gradient(120deg, #2193b0, #6dd5ed, #2193b0); color: #000;">🌊 Ocean Blue</button>
                <button onclick="setTheme('sunset')" class="theme-btn" style="background: linear-gradient(120deg, #ff4e50, #f9d423, #ff4e50); color: #000;">🌅 Sunset Vibes</button>
                <button onclick="setTheme('neon')" class="theme-btn" style="background: linear-gradient(120deg, #ff0099, #493240, #ff0099);">🌸 Cyberpunk Pink</button>
                <button onclick="setTheme('emerald')" class="theme-btn" style="background: linear-gradient(120deg, #11998e, #38ef7d, #11998e); color: #000;">💎 Emerald Green</button>
            </div>

            <h3 style="font-weight: normal; color: #b0bec5; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-top: 30px;">🎨 เลือกสีพื้นหลังจอ</h3>
            <div class="bg-color-list" style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
                <button onclick="setBackground('black')" class="bg-btn" style="background: #000000;">🖤 ดำสนิท</button>
                <button onclick="setBackground('darkgray')" class="bg-btn" style="background: #1c1c1e;">🩶 เทาเข้ม</button>
                <button onclick="setBackground('midnight')" class="bg-btn" style="background: #0a0f24;">🌌 มิดไนท์บลู</button>
                <button onclick="setBackground('deeppurple')" class="bg-btn" style="background: #1a0b2e;">🔮 ม่วงหม่น</button>
            </div>

            <button class="btn-secondary" onclick="showView('view-list')" style="margin-top: 40px;">🏠 กลับคลังเพลง</button>
        </div>

        <div id="view-add" class="view">
            <label>ชื่อเพลง:</label>
            <input type="text" id="inputTitle" placeholder="เช่น ソワレ (Soirée)">
            <label>ชื่อศิลปิน (หากมีหลายคน สามารถใส่ลูกน้ำ หรือ [ชื่อ1] [ชื่อ2]):</label>
            <input type="text" id="inputArtist" placeholder="เช่น [Suisei] [Miko] หรือ Suisei, Miko">
            
            <label>ลิงก์ YouTube:</label>
            <input type="text" id="inputAudio" placeholder="วางลิงก์วิดีโอ YouTube ที่นี่">
            <label>เนื้อเพลง (เว้นบรรทัด 1 บรรทัดเปล่า เพื่อแบ่งท่อนถัดไป):</label>
            <textarea id="inputLyrics" placeholder="ท่อนที่ 1 ญี่ปุ่น&#10;ท่อนที่ 1 โรมาจิ&#10;ท่อนที่ 1 ไทย&#10;&#10;ท่อนที่ 2 ญี่ปุ่น..."></textarea>
            
            <button id="btnSave" onclick="saveSong()">💾 บันทึกเพลง</button>
            <button class="btn-secondary" onclick="showView('view-list')">❌ ยกเลิก</button>
        </div>

        <div id="view-player" class="view">
            <div id="playerSongInfo" style="text-align: center; margin-bottom: 8px; line-height: 1.2;">
                <div id="playerTitle" style="font-size: 1.1em; font-weight: bold; color: #00b4db;">ชื่อเพลง</div>
                <div id="playerArtist" style="font-size: 0.85em; color: #b0bec5; margin-top: 2px;">ศิลปิน</div>
            </div>

            <div class="youtube-container">
                <div id="youtubePlayer"></div>
            </div>
            
            <div class="lyrics-wrapper">
                <div id="lyricsContainer" class="lyrics-container"></div>
            </div>
            
            <div class="button-group" id="lyricControlBtnGroup">
                <button class="btn-secondary" onclick="prevLyric()" style="flex: 1;">⏮ ย้อนกลับ</button>
                <button onclick="nextLyric()" style="flex: 2; font-size: 1.2em;">⏭ ถัดไป</button>
            </div>

            <div class="timestamp-editor-container" id="timestampEditorSection">
                <h4 style="margin: 0 0 10px 0; font-weight: normal; color: #b0bec5; font-size: 0.95em; display: flex; justify-content: space-between;">
                    <span id="tsEditorTitle">⏱ ตั้งเวลา & ใส่ชื่อคนร้อง (Admin)</span>
                </h4>
                <div id="timestampList" class="timestamp-list"></div>
            </div>
            
            <button id="btnResetSync" class="btn-secondary" onclick="resetSync()" style="margin-top: 15px; font-size: 0.9em; background: rgba(255, 152, 0, 0.1); border-color: rgba(255, 152, 0, 0.3); color: #ff9800; display: none;">🔄 ล้างเวลาซิงค์ทั้งหมด (เริ่มจับจังหวะใหม่)</button>
            <button class="btn-secondary" onclick="showView('view-list')" style="margin-top: 15px;">🏠 กลับคลังเพลง</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
